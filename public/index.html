<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebRTC protocol</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="waitingScreen" class="overlay" style="display: none;">
        <h2>Waiting for host to let you in...</h2>
    </div>

    <div id="adminNotifications" class="notifications-container"></div>
    
    <div class="header">
        <h1>RTC Video Call</h1>
        <p>Waiting another user to connect...</p>
    </div>
    
    <div class="main-container">
        <div class="video-grid" id="video-grid">
            <div class="video-container" id="container-local">
                <h3>You</h3>
                <div id="hand-local" class="hand-indicator">✋</div>
                <video id="localVideo" autoplay muted playsinline></video>
            </div>
        </div>

        <div class="controls">
            <button id="muteBtn" class="btn">Mute Audio</button>
            <button id="cameraBtn" class="btn">Turn Off Camera</button>
            <button id="handBtn" class="btn">Raise Hand</button>
            <button id="shareScreenBtn" class="btn" style="background-color: #28a745;">Share Screen</button>
            <button id="boardBtn" class="btn" style="background-color: #6f42c1;">Open Board</button>
            <button id="muteAllBtn" class="btn danger" style="display: none;">Mute All</button>
        </div>
        
        <div class="chat-container">
            <div class="chat-messages" id="chatMessages">
                </div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="Write a message..." autocomplete="off">
                <button id="sendBtn" class="btn">Send</button>
            </div>
        </div>
    </div>

        <div id="boardContainer" class="board-container" style="display: none;">
            <div class="board-toolbar">
                <input type="color" id="colorPicker" value="#007bff" title="Choose color">
                <input type="range" id="brushSize" min="2" max="20" value="5" title="Brush size">
                <button id="clearBoardBtn" class="btn btn-small danger">Clear</button>
                <button id="closeBoardBtn" class="btn btn-small">Close</button>
            </div>
        <canvas id="whiteboard"></canvas>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
    <script src="board.js"></script> 
    
</body>
</html>
