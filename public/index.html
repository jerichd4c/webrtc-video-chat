<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebRTC protocol</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="header">
        <h1>RTC Video Call</h1>
        <p>Waiting another user to connect...</p>
    </div>
    
    <div class="main-container">
        <div class="video-grid" id="video-grid">
            <div class="video-container">
                <h3>You</h3>
                <video id="localVideo" autoplay muted playsinline></video>
            </div>
        </div>

        <div class="controls">
            <button id="muteBtn" class="btn">Mute Audio</button>
            <button id="cameraBtn" class="btn">Turn Off Camera</button>
            <button id="shareScreenBtn" class="btn" style="background-color: #28a745;">Share Screen</button>
            </div>
        
        <div class="chat-container">
            <div class="chat-messages" id="chatMessages">
                </div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="Write a message..." autocomplete="off">
                <button id="sendBtn" class="btn">Send</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
</body>
</html>
